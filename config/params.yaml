# vision_grasp 参数配置
camera_node:
  ros__parameters:
    use_camera: false      # true=真实摄像头, false=仿真
    camera_id: 0
    fps: 30.0
    width: 640
    height: 480
    cam_pos_x: 0.15       # 相机在基座系中的位置 (m)
    cam_pos_y: 0.0
    cam_pos_z: 0.5
    block_names: ['red_block', 'green_block', 'blue_block', 'yellow_block']
    block_xs: [0.30, 0.00, 0.35, 0.05]
    block_ys: [0.15, -0.18, -0.12, 0.20]
    block_sizes: [0.035, 0.035, 0.030, 0.032]
    block_color_bs: [0, 0, 200, 0]
    block_color_gs: [0, 180, 100, 200]
    block_color_rs: [200, 0, 0, 220]

vision_node:
  ros__parameters:
    min_area: 500
    erode_iter: 1
    dilate_iter: 1

tf_transformer_node:
  ros__parameters:
    target_interval: 10.0  # 目标发布间隔 (秒)
    cam_pos_x: 0.15       # 相机在基座系中的位置 (m)
    cam_pos_y: 0.0
    cam_pos_z: 0.5

arm_driver_node:
  ros__parameters:
    use_serial: false      # true=连接真实舵机
    serial_port: '/dev/ttyUSB0'
    baudrate: 1000000

trajectory_node:
  ros__parameters:
    move_duration: 3.0     # 运动时长 (秒)
    publish_rate: 20.0     # 发布频率 (Hz)
    test_mode: false       # true=循环演示各关节, false=等待 IK 目标
    approach_height: 0.15  # 接近目标上方高度 (m)
    lift_height: 0.2       # 抓取后抬升高度 (m)
    home_height: 0.35      # 归位安全高度 (m)
    max_joint_velocity: 1.0 # 最大关节速度 (rad/s)
