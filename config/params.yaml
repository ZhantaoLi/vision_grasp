# vision_grasp 参数配置
camera_node:
  ros__parameters:
    use_camera: false      # true=真实摄像头, false=仿真
    camera_id: 0
    fps: 30.0
    width: 640
    height: 480

vision_node:
  ros__parameters:
    min_area: 500
    erode_iter: 1
    dilate_iter: 1

ik_solver_node:
  ros__parameters:
    urdf_file: ''
    base_link: 'base_link'
    tip_link: 'link6'

arm_driver_node:
  ros__parameters:
    use_serial: false      # true=连接真实舵机
    serial_port: '/dev/ttyUSB0'
    baudrate: 1000000
    gripper_open_angle: 45.0
    gripper_close_angle: -30.0

trajectory_node:
  ros__parameters:
    move_duration: 3.0     # 运动时长 (秒)
    publish_rate: 20.0     # 发布频率 (Hz)
    test_mode: false       # true=循环演示各关节, false=等待 IK 目标
    approach_height: 0.15  # 接近目标上方高度 (m)
    lift_height: 0.2       # 抓取后抬升高度 (m)
    home_height: 0.35      # 归位安全高度 (m)
    max_joint_velocity: 1.0 # 最大关节速度 (rad/s)
